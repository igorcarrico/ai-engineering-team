services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiteam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiteam}
      POSTGRES_DB: ${POSTGRES_DB:-aiteam}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiteam}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aiteam}:${POSTGRES_PASSWORD:-aiteam}@postgres:5432/${POSTGRES_DB:-aiteam}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000
      MOCK_LATENCY_SECONDS: ${MOCK_LATENCY_SECONDS:-0.6}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
